name: Build without docker 

on: 
  push: 
    branches:
      - action-ci
    paths:
      - '.github/workflows/build-no-docker.yaml'

jobs:

  build-without-docker:

    runs-on: ubuntu-22.04

    # Define environment variables globally for the job
    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGPORT: 5432
      NOKOGIRI_USE_SYSTEM_LIBRARIES: true
      RAILS_VERSION: 6.0.5

    # Services start sidecar containers (Postgres) automatically
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ark_manager_test
        ports:
          - 5432:5432
        # Health check ensures Postgres is ready before the script runs
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

